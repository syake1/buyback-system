# .github/workflows/daily_screening.yml
#
# 平日17:00（日本時間）に自動でスクリーニングを実行し、
# 結果をCSVとしてリポジトリに保存する。
# StreamlitアプリはそのCSVを読み込んで表示する。

name: 毎日スクリーニング自動実行

on:
  schedule:
    # UTC 08:00 = 日本時間 17:00（平日のみ）
    - cron: '0 8 * * 1-5'
  # 手動実行ボタンも追加（テスト用）
  workflow_dispatch:

jobs:
  screening:
    runs-on: ubuntu-latest

    steps:
      # リポジトリをチェックアウト
      - name: リポジトリを取得
        uses: actions/checkout@v4

      # Pythonのセットアップ
      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ライブラリのインストール
      - name: ライブラリをインストール
        run: pip install -r requirements.txt

      # スクリーニング実行スクリプトを実行
      - name: スクリーニングを実行
        run: python auto_screening.py

      # 結果CSVをリポジトリにコミット・プッシュ
      - name: 結果をリポジトリに保存
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add data/
          git diff --staged --quiet || git commit -m "自動スクリーニング結果 $(date '+%Y-%m-%d')"
          git push
